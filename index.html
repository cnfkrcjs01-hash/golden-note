        <p class="text-2xl font-bold font-mono text-emerald-400 mt-1" id="statPass">0</p>

        <p class="text-[10px] text-red-400 uppercase tracking-wider font-mono">제외</p>

    <!-- 제외사유별 -->
    <div class="bg-card rounded-lg p-4 mb-5">

      <div class="grid grid-cols-5 gap-2" id="reasonStats"></div>

        <button onclick="filterResult('pass')" class="filter-btn px-3.5 py-1.5 transition-colors" data-filter="pass">지급</button>
        <button onclick="filterResult('fail')" class="filter-btn px-3.5 py-1.5 transition-colors" data-filter="fail">제외</button>
      </div>
      <input type="text" id="searchInput" placeholder="이름 또는 사번 검색..." class="bg-card border border-border rounded-md px-3 py-1.5 text-xs flex-1 max-w-[240px] outline-none focus:border-gold/40 text-txt-secondary placeholder:text-txt-dim" oninput="applyFilters()">
      <button onclick="downloadResult()" class="ml-auto bg-surface border border-border hover:border-cyan/40 text-cyan text-xs font-medium py-1.5 px-4 rounded-md flex items-center gap-1.5 transition-colors">
        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>

      </button>

    <!-- 테이블 -->

          <thead>
            <tr id="resultHeader" class="bg-surface text-txt-dim"></tr>
          </thead>
          <tbody id="resultBody" class="divide-y divide-border/40"></tbody>

<script>
const PW_HASH = 'f411d3fbef511ca08d86d58ee4c451885aed63e43171310e7073a99c5081e649';

async function sha256(msg) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(msg));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

async function handleLogin(e) {
  e.preventDefault();
  const pw = document.getElementById('pwInput').value;
  const hash = await sha256(pw);
  if (hash === PW_HASH) {
    sessionStorage.setItem('goldnote_auth','1');
    document.getElementById('loginScreen').classList.add('hidden');
  } else {
    document.getElementById('loginError').classList.remove('hidden');
    document.getElementById('pwInput').value = '';
    document.getElementById('pwInput').focus();
  }
  return false;
}

(function checkAuth() {
  if (sessionStorage.getItem('goldnote_auth') === '1') {
    document.getElementById('loginScreen').classList.add('hidden');
  } else {
    document.getElementById('loginScreen').classList.remove('hidden');
    setTimeout(() => document.getElementById('pwInput').focus(), 100);
  }
})();

let uploadedData = null;
let resultData = null;
let currentFilter = 'all';

(function init() {
  const select = document.getElementById('baseYear');
  const currentYear = new Date().getFullYear();
  for (let y = currentYear + 1; y >= currentYear - 3; y--) {
    const opt = document.createElement('option');
    opt.value = y;
    opt.textContent = y + '년';
    if (y === currentYear) opt.selected = true;
    select.appendChild(opt);
  }
  select.addEventListener('change', updateCriteria);
  updateCriteria();
  filterResult('all');
})();

function updateCriteria() {
  const year = parseInt(document.getElementById('baseYear').value);
  const rules = [
    { n:'①', label:'3개월 미만 근로자', desc:`${year}.12.01 이후 입사자 → 제외`, c:'#F87171' },
    { n:'②', label:'퇴사자 / 퇴사예정자', desc:`${year}.03.19 이전 퇴사자 → 제외`, c:'#FB923C' },
    { n:'③', label:'휴직자 / 휴직예정자', desc:`${year}.03.20 이전 휴직시작 → 제외`, c:'#FBBF24' },
    { n:'④', label:'직원구분 제외', desc:'고문, 자문, 개인사업자, 아르바이트, 도급', c:'#A78BFA' },
    { n:'⑤', label:'출산→육아 연차소진', desc:'실근무 없을 경우 → 제외', c:'#F472B6' },
  ];
  document.getElementById('criteriaList').innerHTML = rules.map(r =>
    `<div class="flex items-center gap-3 bg-card rounded-md px-3.5 py-2.5">
      <span class="text-sm font-bold" style="color:${r.c}">${r.n}</span>
      <div class="flex-1 min-w-0">
        <p class="text-xs font-medium text-[#E2E8F0]">${r.label}</p>
        <p class="font-mono text-[10px] text-txt-muted mt-0.5">${r.desc}</p>
      </div>
    </div>`
  ).join('');
}

function downloadTemplate() {
  const headers = ['No','고유사번','사번','성명','파견업체','본/지점','그룹입사일','계약종료일','직원구분','퇴사일','휴직시작일','휴직종료일','휴직사유','출산→육아\n연차소진\n(실근무無)'];
  const ws = XLSX.utils.aoa_to_sheet([headers]);
  ws['!cols'] = [{wch:5},{wch:12},{wch:12},{wch:10},{wch:12},{wch:8},{wch:14},{wch:14},{wch:12},{wch:14},{wch:14},{wch:14},{wch:15},{wch:16}];
  const sample = [1,'0000001','A0000001','홍길동','','본점','2020.03.01','','정규직','','','','',''];
  XLSX.utils.sheet_add_aoa(ws, [sample], {origin:'A2'});
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, '직원데이터');
  XLSX.writeFile(wb, `피복비_업로드_템플릿_${document.getElementById('baseYear').value}.xlsx`);
}

function handleDragOver(e) { e.preventDefault(); e.currentTarget.classList.add('dragover'); }
function handleDragLeave(e) { e.currentTarget.classList.remove('dragover'); }
function handleDrop(e) { e.preventDefault(); e.currentTarget.classList.remove('dragover'); if (e.dataTransfer.files[0]) processFile(e.dataTransfer.files[0]); }
function handleFileSelect(e) { if (e.target.files[0]) processFile(e.target.files[0]); }

function processFile(file) {
  if (!file.name.match(/\.xlsx?$/i)) { alert('xlsx 파일만 업로드 가능합니다.'); return; }
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const wb = XLSX.read(e.target.result, { type:'array', cellDates:false, raw:true });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const raw = XLSX.utils.sheet_to_json(ws, { header:1, defval:'' });
      if (raw.length < 2) { alert('데이터가 없습니다.'); return; }
      const headerRow = raw[0].map(h => String(h).replace(/\n/g,'').trim());
      const data = [];
      for (let i = 1; i < raw.length; i++) {
        const row = raw[i];
        if (!row || row.every(c => c === '' || c == null)) continue;
        const obj = {};
        headerRow.forEach((h, idx) => { obj[h] = row[idx] != null ? String(row[idx]).trim() : ''; });
        data.push(obj);
      }
      uploadedData = data;
      document.getElementById('fileName').textContent = `${file.name} (${data.length}명)`;
      document.getElementById('fileInfo').classList.remove('hidden');
      document.getElementById('runSection').classList.remove('hidden');
      document.getElementById('resultSection').classList.add('hidden');
    } catch(err) { alert('파일 읽기 오류: ' + err.message); }
  };
  reader.readAsArrayBuffer(file);
}

function clearFile() {
  uploadedData = null; resultData = null;
  document.getElementById('fileInput').value = '';
  document.getElementById('fileInfo').classList.add('hidden');
  document.getElementById('runSection').classList.add('hidden');
  document.getElementById('resultSection').classList.add('hidden');
}

function parseDate(val) {
  if (!val || val === '') return null;
  const s = String(val).trim();
  const m = s.match(/^(\d{4})[.\-\/](\d{1,2})[.\-\/](\d{1,2})$/);
  if (m) return new Date(parseInt(m[1]), parseInt(m[2])-1, parseInt(m[3]));
  const num = parseFloat(s);
  if (!isNaN(num) && num > 30000 && num < 60000) return new Date((num - 25569) * 86400 * 1000);
  const d = new Date(s);
  return isNaN(d.getTime()) ? null : d;
}

function runJudgment() {
  if (!uploadedData || !uploadedData.length) { alert('업로드된 데이터가 없습니다.'); return; }
  const year = parseInt(document.getElementById('baseYear').value);
  const excludedTypes = ['고문','자문','개인사업자','아르바이트','도급'];
  const cutoffHire = new Date(year, 11, 1);
  const cutoffResign = new Date(year, 2, 19);
  const cutoffLeave = new Date(year, 2, 20);

  function findKey(obj, candidates) {
    for (const k of Object.keys(obj)) {
      const clean = k.replace(/[\n\r\s]/g,'');
      for (const c of candidates) { if (clean.includes(c)) return k; }
    }
    return null;
  }

  resultData = uploadedData.map(row => {
    const kHire = findKey(row, ['그룹입사일','입사일']);
    const kResign = findKey(row, ['퇴사일']);
    const kLeaveStart = findKey(row, ['휴직시작일']);
    const kType = findKey(row, ['직원구분']);
    const kMaternity = findKey(row, ['출산','연차소진','실근무']);
    const hireDate = parseDate(row[kHire]);
    const resignDate = parseDate(row[kResign]);
    const leaveStartDate = parseDate(row[kLeaveStart]);
    const empType = row[kType] ? String(row[kType]).trim() : '';
    const maternityFlag = row[kMaternity] ? String(row[kMaternity]).trim() : '';
    let reasons = [];
    let rule1='', rule2='', rule3='', rule4='', rule5='';
    if (hireDate && hireDate > cutoffHire) { rule1='제외'; reasons.push('①3개월미만'); }
    if (resignDate && resignDate <= cutoffResign) { rule2='제외'; reasons.push('②퇴사제외'); }
    if (leaveStartDate && leaveStartDate <= cutoffLeave) { rule3='제외'; reasons.push('③휴직제외'); }
    if (excludedTypes.includes(empType)) { rule4='제외'; reasons.push('④직원구분제외'); }
    if (['O','o','Y','y'].includes(maternityFlag)) { rule5='제외'; reasons.push('⑤출산연차제외'); }
    const excluded = reasons.length > 0;
    return { ...row, _rule1:rule1, _rule2:rule2, _rule3:rule3, _rule4:rule4, _rule5:rule5, _judgment:excluded?'제외':'지급', _reasons:reasons.join(', '), _excluded:excluded };
  });
  displayResults();
}

function displayResults() {
  if (!resultData) return;
  const total = resultData.length;
  const pass = resultData.filter(r => !r._excluded).length;
  const fail = total - pass;
  document.getElementById('statTotal').textContent = total.toLocaleString();
  document.getElementById('statPass').textContent = pass.toLocaleString();
  document.getElementById('statFail').textContent = fail.toLocaleString();
  document.getElementById('statRate').textContent = total > 0 ? (fail/total*100).toFixed(1)+'%' : '0%';

  const rc = {'①3개월미만':0,'②퇴사제외':0,'③휴직제외':0,'④직원구분제외':0,'⑤출산연차제외':0};
  const rClr = {'①3개월미만':'#F87171','②퇴사제외':'#FB923C','③휴직제외':'#FBBF24','④직원구분제외':'#A78BFA','⑤출산연차제외':'#F472B6'};
  resultData.forEach(r => { if(r._rule1)rc['①3개월미만']++; if(r._rule2)rc['②퇴사제외']++; if(r._rule3)rc['③휴직제외']++; if(r._rule4)rc['④직원구분제외']++; if(r._rule5)rc['⑤출산연차제외']++; });
  document.getElementById('reasonStats').innerHTML = Object.entries(rc).map(([k,v]) =>
    `<div class="bg-surface rounded-md p-2.5 text-center"><p class="text-[10px] font-mono" style="color:${rClr[k]}">${k}</p><p class="text-base font-bold font-mono mt-1" style="color:${rClr[k]}">${v}</p></div>`
  ).join('');

  const displayCols = ['No','고유사번','사번','성명','본/지점','직원구분','그룹입사일','퇴사일','휴직시작일'];
  const judgCols = ['①3개월미만','②퇴사제외','③휴직제외','④직원구분제외','⑤출산연차제외','최종판정','제외사유'];
  document.getElementById('resultHeader').innerHTML =
    displayCols.map(c => `<th class="px-3 py-2.5 text-left text-[10px] font-semibold uppercase tracking-wider whitespace-nowrap sticky top-0 bg-surface z-10">${c}</th>`).join('') +
    judgCols.map(c => `<th class="px-3 py-2.5 text-center text-[10px] font-semibold uppercase tracking-wider whitespace-nowrap sticky top-0 bg-surface z-10">${c}</th>`).join('');
  applyFilters();
  document.getElementById('resultSection').classList.remove('hidden');
  document.getElementById('resultSection').scrollIntoView({ behavior:'smooth', block:'start' });
}

function applyFilters() {
  if (!resultData) return;
  const search = document.getElementById('searchInput').value.toLowerCase();
  let filtered = resultData;
  if (currentFilter === 'pass') filtered = filtered.filter(r => !r._excluded);
  else if (currentFilter === 'fail') filtered = filtered.filter(r => r._excluded);
  if (search) filtered = filtered.filter(r => Object.values(r).some(v => String(v).toLowerCase().includes(search)));

  const sample = resultData[0] || {};
  const displayCols = ['No','고유사번','사번','성명','본/지점','직원구분','그룹입사일','퇴사일','휴직시작일'];
  function fk(obj,n) { for(const k of Object.keys(obj)){if(k.replace(/[\n\r\s]/g,'').includes(n.replace(/\s/g,'')))return k;} return n; }
  const colKeys = displayCols.map(c => fk(sample, c));

  document.getElementById('resultBody').innerHTML = filtered.map(r => {
    const cells = colKeys.map(k => {
      let v = r[k]||'';
      const isType = k && k.includes('직원구분');
      const excType = ['고문','자문','개인사업자','아르바이트','도급'].includes(v);
      return `<td class="px-3 py-2 whitespace-nowrap ${isType&&excType?'text-red-400':'text-txt-secondary'}">${v}</td>`;
    }).join('');
    const rc = v => v ? '<td class="px-3 py-2 text-center font-mono text-red-400">제외</td>' : '<td class="px-3 py-2 text-center text-txt-dim/30 font-mono">-</td>';
    const jc = r._excluded
      ? '<td class="px-3 py-2 text-center"><span class="px-1.5 py-0.5 rounded bg-red-500/10 text-red-400 text-[10px] font-medium">제외</span></td>'
      : '<td class="px-3 py-2 text-center"><span class="px-1.5 py-0.5 rounded bg-emerald-500/10 text-emerald-400 text-[10px] font-medium">지급</span></td>';
    return `<tr class="${r._excluded?'bg-red-950/10':''} hover:bg-white/[0.02] transition-colors">${cells}${rc(r._rule1)}${rc(r._rule2)}${rc(r._rule3)}${rc(r._rule4)}${rc(r._rule5)}${jc}<td class="px-3 py-2 text-[10px] text-txt-dim max-w-[180px] truncate" title="${r._reasons}">${r._reasons}</td></tr>`;
  }).join('');
}

function filterResult(type) {
  currentFilter = type;
  document.querySelectorAll('.filter-btn').forEach(btn => {
    const active = btn.dataset.filter === type;
    btn.className = `filter-btn px-3.5 py-1.5 transition-colors ${active ? 'bg-gold/20 text-gold font-medium' : 'text-txt-dim hover:text-txt-secondary'}`;
  });
  applyFilters();
}

function downloadResult() {
  if (!resultData) return;
  const sample = resultData[0];
  const origKeys = Object.keys(sample).filter(k => !k.startsWith('_'));
  const headers = [...origKeys,'①3개월미만','②퇴사제외','③휴직제외','④직원구분제외','⑤출산연차제외','최종판정','제외사유'];
  const rows = [headers];
  resultData.forEach(r => { const row = origKeys.map(k=>r[k]||''); row.push(r._rule1,r._rule2,r._rule3,r._rule4,r._rule5,r._judgment,r._reasons); rows.push(row); });
  const ws = XLSX.utils.aoa_to_sheet(rows);
  ws['!cols'] = headers.map(h => ({wch:Math.max(h.length*2,10)}));
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, '피복비 판정결과');
  XLSX.writeFile(wb, `피복비_판정결과_${document.getElementById('baseYear').value}.xlsx`);
}
</script>
</body>
</html>
